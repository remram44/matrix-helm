{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "matrix.postgresql.fullname" . }}
  labels:
    {{- include "matrix.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
  selector:
    {{- include "matrix.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
{{- end }}
